version: '3.8'

services:
  # Frontend - Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend

  # Backend - Node.js Express
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/retailnova_ai?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  # AI Gateway - Python FastAPI
  ai-gateway:
    build:
      context: ./ai-services
      dockerfile: ../docker/ai.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./ai-services:/app

  # Primary Database - PostgreSQL
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: retailnova_ai
    volumes:
      - pg_data:/var/lib/postgresql/data

  # Cache & PubSub - Redis
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
