version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: retailnova-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-retailnova}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: retailnova-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: retailnova-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-retailnova}?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: ${JWT_SECRET:-retailnova_enterprise_secret_2024}
      AI_SERVICE_URL: "http://ai-service:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: retailnova-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api/v1"
      NEXT_PUBLIC_SOCKET_URL: "http://localhost:5000"
    depends_on:
      - backend

  ai-service:
    build: ./ai-services
    container_name: retailnova-ai-service
    restart: always
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - redis

volumes:
  postgres_data:
